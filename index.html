<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wine List 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --paper: #f7f7f4;
      --card: #ffffff;
      --ink: #1f1f1d;
      --muted: #74746f;
      --accent: #7c6741;
      --line: #efede8;
      --shadow: 0 6px 18px rgba(0, 0, 0, .04);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .68rem;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0 0 18px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: .95;
      letter-spacing: -.04em;
    }

    .controls {
      display: flex;
      align-items: center;
    }

    #search {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font: inherit;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.03);
    }

    #search:focus {
      outline: 3px solid rgba(124, 103, 65, .16);
      border-color: var(--accent);
      background: #fff;
    }

    .count {
      display: none;
    }

    main.wrap {
      padding-top: 20px;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .wine {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 15px;
      box-shadow: var(--shadow);
    }

    .name {
      font-size: 1rem;
      line-height: 1.3;
      font-weight: 650;
      letter-spacing: -.01em;
    }

    .price {
      min-width: 78px;
      text-align: right;
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
    }

    .status {
      color: var(--muted);
      padding: 18px 4px;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
    }

    @media (max-width: 420px) {
      .wrap {
        padding: 20px 13px 26px;
      }

      main.wrap {
        padding-top: 18px;
      }

      .wine {
        border-radius: 13px;
        padding: 13px;
      }

      .name, .price {
        font-size: .96rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="eyebrow">Ross Island Grocery & Café</div>
      <h1>Wine List</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search wines…" autocomplete="off" />
        <div id="count" class="count"></div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Loading wine list…</div>
    <div id="list" class="list"></div>
    <div class="note">Prices update from the Google Sheet.</div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSxrcKWsspwHV831eepagyuMCEfR_vivP_pHWlB34wEDjJm4D4xd-mjiidigPsS9U4YeJW5OTBz_rw/pub?gid=775071093&single=true&output=csv";

    const list = document.getElementById("list");
    const status = document.getElementById("status");
    const search = document.getElementById("search");
    const count = document.getElementById("count");

    let wines = [];

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (cell || row.length) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "\r" && next === "\n") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function render(filter = "") {
      const query = filter.trim().toLowerCase();
      const matches = wines.filter(wine =>
        wine.name.toLowerCase().includes(query)
      );

      list.innerHTML = "";

      if (!matches.length) {
        status.textContent = "No matching wines.";
        count.textContent = "";
        return;
      }

      status.textContent = "";
      count.textContent = "";

      for (const wine of matches) {
        const item = document.createElement("div");
        item.className = "wine";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = wine.name;

        const price = document.createElement("div");
        price.className = "price";
        price.textContent = wine.price;

        item.appendChild(name);
        item.appendChild(price);
        list.appendChild(item);
      }
    }

    async function loadWineList() {
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error("Could not load CSV");

        const csv = await response.text();
        const rows = parseCSV(csv).slice(1);

        wines = rows
          .map(row => ({
            name: (row[0] || "").trim(),
            price: (row[1] || "").trim()
          }))
          .filter(wine => wine.name && wine.price);

        render();
      } catch (error) {
        status.textContent = "Could not load wine list. Check the CSV URL.";
      }
    }

    search.addEventListener("input", () => render(search.value));
    loadWineList();
  </script>
</body>
</html>
