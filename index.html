<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wine List 2026</title>
  <style>
    :root {
      --bg: #f7f1e6;
      --paper: #fffdf8;
      --ink: #221f1b;
      --muted: #776f64;
      --gold: #d8a642;
      --gold-dark: #9b6a17;
      --green: #52786f;
      --line: #eadfce;
      --shadow: 0 10px 30px rgba(54, 38, 18, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(216,166,66,.18), transparent 34rem),
        linear-gradient(180deg, #fbf6ec 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: -18px -14px 14px;
      padding: 22px 14px 14px;
      background: rgba(247, 241, 230, .94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(234, 223, 206, .9);
    }

    .title-card {
      max-width: 820px;
      margin: 0 auto;
    }

    .eyebrow {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: .72rem;
      color: var(--gold-dark);
      font-weight: 800;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: .92;
      letter-spacing: -.04em;
    }

    .controls {
      display: flex;
      gap: 9px;
      align-items: center;
    }

    #search {
      width: 100%;
      padding: 14px 15px;
      font-size: 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 2px 10px rgba(54, 38, 18, .05);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #search:focus {
      outline: 3px solid rgba(216,166,66,.28);
      border-color: var(--gold);
    }

    .count {
      white-space: nowrap;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .88rem;
      color: var(--muted);
      padding-right: 4px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .wine {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: rgba(255,253,248,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px 15px 14px;
      box-shadow: var(--shadow);
    }

    .name {
      font-size: 1.08rem;
      line-height: 1.22;
      font-weight: 700;
    }

    .price {
      min-width: 82px;
      text-align: right;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1.08rem;
      font-weight: 850;
      color: var(--green);
    }

    .status {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      padding: 16px 4px;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .78rem;
    }

    @media (max-width: 420px) {
      .wine {
        border-radius: 15px;
        padding: 13px 13px;
      }

      .name, .price {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-card">
      <div class="eyebrow">Ross Island Grocery & Café</div>
      <h1>Wine List</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search wines…" autocomplete="off" />
        <div id="count" class="count"></div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div id="status" class="status">Loading wine list…</div>
    <div id="list" class="list"></div>
    <div class="note">Prices update from the Google Sheet.</div>
  </div>

  <script>
    // Replace this with your published Google Sheets CSV URL.
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSxrcKWsspwHV831eepagyuMCEfR_vivP_pHWlB34wEDjJm4D4xd-mjiidigPsS9U4YeJW5OTBz_rw/pub?gid=775071093&single=true&output=csv";

    const list = document.getElementById("list");
    const status = document.getElementById("status");
    const search = document.getElementById("search");
    const count = document.getElementById("count");

    let wines = [];

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (cell || row.length) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "\r" && next === "\n") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function render(filter = "") {
      const query = filter.trim().toLowerCase();
      const matches = wines.filter(wine =>
        wine.name.toLowerCase().includes(query)
      );

      list.innerHTML = "";

      if (!matches.length) {
        status.textContent = "No matching wines.";
        count.textContent = "";
        return;
      }

      status.textContent = "";
      count.textContent = `${matches.length}`;

      for (const wine of matches) {
        const item = document.createElement("div");
        item.className = "wine";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = wine.name;

        const price = document.createElement("div");
        price.className = "price";
        price.textContent = wine.price;

        item.appendChild(name);
        item.appendChild(price);
        list.appendChild(item);
      }
    }

    async function loadWineList() {
      if (CSV_URL === "PASTE_YOUR_CSV_URL_HERE") {
        status.textContent = "Paste your Google Sheets CSV URL into the HTML file first.";
        return;
      }

      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error("Could not load CSV");

        const csv = await response.text();
        const rows = parseCSV(csv).slice(1);

        wines = rows
          .map(row => ({
            name: (row[0] || "").trim(),
            price: (row[1] || "").trim()
          }))
          .filter(wine => wine.name && wine.price);

        render();
      } catch (error) {
        status.textContent = "Could not load wine list. Check the CSV URL.";
      }
    }

    search.addEventListener("input", () => render(search.value));
    loadWineList();
  </script>
</body>
</html>
